apiVersion: v2
name: notifbuddy
description: Slack channels for your Linear issues — self-hosted.
type: application

# PLACEHOLDERS. Both are set from the git tag when the chart is published:
# version is the tag without its leading "v", appVersion is the tag verbatim.
# Nothing here needs bumping by hand, and these values are deliberately not a
# real release — a git checkout is not a released artifact.
#
# Installing from a checkout therefore needs an explicit image tag:
#
#   helm install notifbuddy ./charts/notifbuddy --set image.tag=v0.2.0 ...
#
# Released charts come from oci://ghcr.io/notifbuddy/charts/notifbuddy.
version: 0.0.0
appVersion: "0.0.0-dev"

home: https://notifbuddy.com
sources:
  - https://github.com/notifbuddy/notifbuddy
icon: https://notifbuddy.com/apple-touch-icon.png

keywords:
  - slack
  - linear
  - notifications
  - developer-tools

maintainers:
  - name: notifbuddy
    url: https://github.com/notifbuddy

annotations:
  artifacthub.io/license: MIT
  # Artifact Hub scans these for vulnerabilities, so the tags have to be the
  # ones this chart actually deploys. The placeholder below is rewritten to
  # the release tag at package time, alongside version and appVersion.
  artifacthub.io/images: |
    - name: backend
      image: ghcr.io/notifbuddy/backend:0.0.0-dev
    - name: authd
      image: ghcr.io/notifbuddy/authd:0.0.0-dev
    - name: dashboard
      image: ghcr.io/notifbuddy/dashboard:0.0.0-dev
