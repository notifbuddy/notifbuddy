{{- if not .Values.existingSecret }}
{{- if not .Values.github.clientSecret }}
{{- fail "notifbuddy: set `github.clientSecret` (GitHub OAuth is the only sign-in method), or point `existingSecret` at a Secret that carries GITHUB_CLIENT_SECRET" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "notifbuddy.fullname" . }}
  labels:
    {{- include "notifbuddy.labels" . | nindent 4 }}
  annotations:
    # Kept on uninstall: it holds the key that stored integration tokens are
    # encrypted with, and the bundled Postgres password. Losing it while the
    # volume survives leaves data that cannot be read back.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- include "notifbuddy.secretData" . | nindent 2 }}
{{- end }}
