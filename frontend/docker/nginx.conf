# Static serving for the dashboard SPA. Dropped into conf.d/ in the
# nginx-unprivileged image, which already listens as a non-root user.
server {
	listen 8080;
	server_name _;
	root /usr/share/nginx/html;

	# Kubernetes probes. Cheap and dependency-free: the dashboard is static, so
	# "nginx is up" is the whole health story.
	location = /healthz {
		access_log off;
		default_type text/plain;
		return 200 "ok\n";
	}

	# Content-addressed bundle assets — the filename changes whenever the bytes
	# do, so they can be cached indefinitely.
	location /_app/immutable/ {
		add_header Cache-Control "public, max-age=31536000, immutable";
	}

	# The shell carries the runtime config written at container start, so it
	# must be revalidated every load — otherwise an upgrade that changes the
	# API origin would keep serving the old one from cache.
	location = /index.html {
		add_header Cache-Control "no-cache";
	}

	# True SPA: unknown paths are client-side routes, so serve the shell and let
	# the router take over (matching the not_found_handling we use on Cloudflare).
	location / {
		try_files $uri $uri/ /index.html;
	}

	gzip on;
	gzip_types text/css application/javascript application/json image/svg+xml;
	gzip_min_length 1024;
}
