openapi: 3.0.3
info:
  title: Xolo Ping API
  description: |
    A minimal spec-first ping/pong API with WorkOS AuthKit authentication. This
    file is the single source of truth for both the Go server stub (generated by
    ogen) and the TypeScript client (generated by openapi-typescript).

    Note: the browser-redirect auth routes (`GET /auth/login`, `GET /auth/callback`,
    `GET /auth/logout`) are intentionally NOT modelled here. They are 302 redirect
    flows that set/clear an HttpOnly session cookie, not JSON operations, so they
    live as plain net/http handlers alongside the generated server. Only the JSON
    API (the operations below) is spec-driven.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /ping:
    get:
      operationId: ping
      summary: Ping the server
      description: |
        Returns a pong message. Requires an authenticated session — the request
        must carry a valid `wos_session` cookie. Used to verify the end-to-end
        authenticated transport.
      responses:
        "200":
          description: A pong response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PongResponse"
        "401":
          description: No valid session — the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Complete email-verification during login
      description: |
        Some providers (notably GitHub OAuth) return an unverified email on first
        login, so WorkOS requires email verification before issuing a session. The
        `/auth/callback` handler detects this, stores the WorkOS
        `pending_authentication_token` in a short-lived sealed cookie, and sends
        the browser to the SPA's verification step. The SPA collects the code
        WorkOS emailed and POSTs it here to finish authentication and establish
        the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Verification succeeded; the session cookie is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: |
            No pending verification, an expired/invalid pending token, or a wrong
            verification code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me:
    get:
      operationId: getMe
      summary: Get the current user
      description: |
        Returns the WorkOS user backing the current session. Requires a valid
        `wos_session` cookie; returns 401 when unauthenticated. The SPA calls this
        on load to decide whether to show the signed-in or signed-out UI.
      responses:
        "200":
          description: The authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: No valid session — the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/pending-orgs:
    get:
      operationId: getPendingOrgs
      summary: List organizations awaiting selection
      description: |
        During the org-selection step the SPA calls this to read the organizations
        the user may choose between. The choices were stashed by `/auth/callback`
        in a short-lived sealed cookie. Returns 401 if there is no pending
        selection.
      responses:
        "200":
          description: The organizations to choose from.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingOrganizations"
        "401":
          description: No pending organization selection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/select-org:
    post:
      operationId: selectOrg
      summary: Complete login by choosing an organization
      description: |
        Finishes a login that WorkOS gated on organization selection. Exchanges
        the chosen organization plus the stashed pending token for a session,
        sets the session cookie, and returns the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectOrgRequest"
      responses:
        "200":
          description: Selection succeeded; the session cookie is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: No pending selection, or an invalid/expired pending token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /invitations:
    get:
      operationId: listInvitations
      summary: List the active organization's invitations
      description: |
        Returns the invitations for the caller's active organization. Requires a
        session scoped to an organization.
      responses:
        "200":
          description: The organization's invitations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createInvitation
      summary: Invite an email to the active organization
      description: |
        Sends a WorkOS invitation for the given email to the caller's active
        organization (optionally with a role). WorkOS emails the invitee a link;
        accepting it (by logging in with the invitation token) creates their
        membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "200":
          description: The created invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"
        "400":
          description: The request was invalid (e.g. no active organization).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /members:
    get:
      operationId: listMembers
      summary: List the active organization's members
      description: |
        Returns the active members of the caller's active organization, resolved
        from WorkOS organization memberships. Requires a session scoped to an
        organization.
      responses:
        "200":
          description: The organization's members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/status:
    get:
      operationId: getIntegrationStatus
      summary: Integration connection status for the active organization
      description: |
        Returns the connection state of each supported integration (GitHub,
        Slack, Linear) for the caller's active organization. Drives the
        integrations settings view. The actual connect/callback flows are
        browser redirects (GET /integrations/{provider}/connect) and are not
        part of this JSON spec.
      responses:
        "200":
          description: Per-provider connection status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatusResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/{provider}/disconnect:
    post:
      operationId: disconnectIntegration
      summary: Disconnect an integration from the active organization
      description: |
        Removes the stored installation/token for the given provider at the given
        level. level=workspace (default) removes the org-wide connection;
        level=user removes only the caller's own per-user connection.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, slack, linear]
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [workspace, user]
            default: workspace
      responses:
        "200":
          description: Disconnected (or was already not connected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatusResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/github/webhooks:
    get:
      operationId: listGithubWebhooks
      summary: Recent GitHub webhook deliveries for the active organization
      description: |
        Returns the GitHub webhook events we have received and stored for the
        caller's active organization, newest first. Events are stored when GitHub
        delivers them to POST /integrations/github/webhook (a browser-external
        redirect-style route, not part of this JSON spec).
      responses:
        "200":
          description: Recent webhook events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/webhooks:
    get:
      operationId: listLinearWebhooks
      summary: Recent Linear webhook deliveries for the active organization
      description: |
        Returns the Linear webhook events we have received and stored for the
        caller's active organization, newest first. Events are stored when Linear
        delivers them to POST /integrations/linear/webhook (a browser-external
        redirect-style route, not part of this JSON spec).
      responses:
        "200":
          description: Recent webhook events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/settings:
    get:
      operationId: getLinearSettings
      summary: Linear channel-creation settings for the active organization
      description: |
        Returns the org's Linear → Slack channel-creation rules (creation mode,
        trigger status, name template, condition, auto-add bots), whether Linear
        is connected at the workspace level, and the built-in sample events for
        the test panel.
      responses:
        "200":
          description: Current settings + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: saveLinearSettings
      summary: Save Linear channel-creation settings
      description: |
        Persists the org's Linear settings. The name template and condition are
        validated (parsed) before saving; a malformed template returns 400.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinearSettings"
      responses:
        "200":
          description: Saved; returns the refreshed settings + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "400":
          description: Invalid settings (e.g. unparseable template/condition).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/settings/test:
    post:
      operationId: testLinearTemplate
      summary: Test a name template + condition against a sample or pasted event
      description: |
        Renders nameTemplate and evaluates condition against the supplied event.
        Provide either a sampleId (one of the built-in sample events) or a raw
        event JSON string. Returns the rendered name, the condition result, and
        any template error (template errors are returned in-body, not as 4xx, so
        the UI can show them inline).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateTestRequest"
      responses:
        "200":
          description: Test result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateTestResponse"
        "400":
          description: Neither sampleId nor a valid event was provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    PongResponse:
      type: object
      description: The response returned by the ping endpoint.
      properties:
        message:
          type: string
          description: Always the literal string "pong".
          example: pong
      required:
        - message
    UserResponse:
      type: object
      description: The authenticated WorkOS user and their active organization context.
      properties:
        id:
          type: string
          description: The WorkOS user ID.
          example: user_01H...
        email:
          type: string
          description: The user's email address.
          example: jane@example.com
        firstName:
          type: string
          description: The user's first name, if set.
          example: Jane
        lastName:
          type: string
          description: The user's last name, if set.
          example: Doe
        profilePictureUrl:
          type: string
          description: >-
            URL of the user's profile picture, if any. For GitHub logins this is
            the user's GitHub avatar, captured by WorkOS at sign-in.
          example: https://avatars.githubusercontent.com/u/12345?v=4
        organizationId:
          type: string
          description: The ID of the organization the current session is scoped to, if any.
          example: org_01H...
        role:
          type: string
          description: The user's role within the active organization, if any.
          example: admin
        organizations:
          type: array
          description: All organizations the user is a member of.
          items:
            $ref: "#/components/schemas/Organization"
      required:
        - id
        - email
    Organization:
      type: object
      description: A WorkOS organization the user belongs to.
      properties:
        id:
          type: string
          description: The WorkOS organization ID.
          example: org_01H...
        name:
          type: string
          description: The organization's display name.
          example: Acme Inc
        role:
          type: string
          description: The user's role in this organization, if known.
          example: member
      required:
        - id
        - name
    VerifyEmailRequest:
      type: object
      description: The verification code the user received by email.
      properties:
        code:
          type: string
          description: The one-time verification code WorkOS emailed to the user.
          example: "123456"
      required:
        - code
    SelectOrgRequest:
      type: object
      description: The organization the user chose during the org-selection step.
      properties:
        organizationId:
          type: string
          description: The ID of the organization to authenticate into.
          example: org_01H...
      required:
        - organizationId
    PendingOrganizations:
      type: object
      description: The organizations a user may choose between during org selection.
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
      required:
        - organizations
    CreateInvitationRequest:
      type: object
      description: Invite an email address to the caller's active organization.
      properties:
        email:
          type: string
          description: The email address to invite.
          example: newteammate@example.com
        role:
          type: string
          description: Optional role slug to grant the invitee on acceptance.
          example: member
      required:
        - email
    InvitationResponse:
      type: object
      description: A WorkOS organization invitation.
      properties:
        id:
          type: string
          example: invitation_01H...
        email:
          type: string
          example: newteammate@example.com
        state:
          type: string
          description: The invitation state (pending, accepted, expired, revoked).
          example: pending
        expiresAt:
          type: string
          description: ISO 8601 expiry timestamp.
          example: "2026-07-03T00:00:00Z"
      required:
        - id
        - email
        - state
    InvitationListResponse:
      type: object
      description: A list of invitations for the active organization.
      properties:
        invitations:
          type: array
          items:
            $ref: "#/components/schemas/InvitationResponse"
      required:
        - invitations
    MemberResponse:
      type: object
      description: A member of the active organization (a WorkOS organization membership).
      properties:
        id:
          type: string
          description: The WorkOS organization membership ID.
          example: om_01H...
        userId:
          type: string
          description: The WorkOS user ID of the member.
          example: user_01H...
        email:
          type: string
          description: The member's email address.
          example: jane@example.com
        firstName:
          type: string
          description: The member's first name, if set.
          example: Jane
        lastName:
          type: string
          description: The member's last name, if set.
          example: Doe
        role:
          type: string
          description: The member's role slug within the organization, if any.
          example: admin
      required:
        - id
        - userId
        - email
    MemberListResponse:
      type: object
      description: A list of members for the active organization.
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberResponse"
      required:
        - members
    IntegrationStatus:
      type: object
      description: The connection state of a single integration provider at one level.
      properties:
        provider:
          type: string
          description: The provider key.
          example: github
        level:
          type: string
          description: |
            Whether this entry is the organization's workspace-wide connection or
            the caller's own per-user connection.
          enum: [workspace, user]
          example: workspace
        connected:
          type: boolean
          description: Whether this provider is connected at this level.
        account:
          type: string
          description: The connected account/workspace label (GitHub login, Slack team).
          example: acme
        connectedBy:
          type: string
          description: The WorkOS user id who connected it, if known.
          example: user_01H...
      required:
        - provider
        - level
        - connected
    IntegrationStatusResponse:
      type: object
      description: Connection status for every supported integration.
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationStatus"
        configured:
          type: boolean
          description: Whether the integration service is configured (database available) on the server.
      required:
        - integrations
        - configured
    WebhookEvent:
      type: object
      description: A stored GitHub webhook delivery.
      properties:
        deliveryId:
          type: string
          description: The X-GitHub-Delivery id (unique per delivery).
          example: 12345678-1234-1234-1234-123456789012
        eventType:
          type: string
          description: The X-GitHub-Event type.
          example: push
        action:
          type: string
          description: The payload action, when present.
          example: opened
        receivedAt:
          type: string
          description: ISO 8601 timestamp when we received it.
          example: "2026-06-26T12:00:00Z"
        payload:
          type: string
          description: The raw webhook JSON payload (as a string).
      required:
        - deliveryId
        - eventType
        - receivedAt
    WebhookListResponse:
      type: object
      description: Recent webhook events for the active organization.
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
      required:
        - events
    Error:
      type: object
      description: A generic error response.
      properties:
        message:
          type: string
          description: A human-readable description of the error.
          example: unauthorized
      required:
        - message
    LinearSettings:
      type: object
      description: An organization's Linear → Slack channel-creation rules.
      properties:
        creationMode:
          type: string
          description: |
            'status' auto-creates a channel when an issue reaches triggerStatus;
            'manual' only creates via @notifbuddy.
          enum: [status, manual]
          example: manual
        triggerStatus:
          type: string
          description: Linear workflow state name that triggers creation (status mode).
          example: In Progress
        nameTemplate:
          type: string
          description: GitHub-Actions-expression template for the channel name.
          example: tkt-${{ linear.data.identifier }}
        conditionExpr:
          type: string
          description: GitHub-Actions-expression that must be true for creation.
          example: linear.action == 'update'
        autoAddBots:
          type: array
          description: Bots to auto-add on channel creation.
          items:
            type: string
          example: ["claude", "linear"]
      required:
        - creationMode
        - autoAddBots
    SampleEvent:
      type: object
      description: A built-in example event for the settings test panel.
      properties:
        id:
          type: string
          example: issue.status_changed
        label:
          type: string
          example: "issue: status changed"
        raw:
          type: string
          description: The event envelope JSON (as a string).
      required:
        - id
        - label
        - raw
    LinearSettingsResponse:
      type: object
      description: Linear settings plus context for the settings UI.
      properties:
        connected:
          type: boolean
          description: Whether Linear is connected at the workspace level.
        settings:
          $ref: "#/components/schemas/LinearSettings"
        sampleEvents:
          type: array
          items:
            $ref: "#/components/schemas/SampleEvent"
      required:
        - connected
        - settings
        - sampleEvents
    TemplateTestRequest:
      type: object
      description: |
        A template-test request. Provide exactly one event source: sampleId
        (a built-in sample event) or event (a raw envelope JSON string).
      properties:
        nameTemplate:
          type: string
          example: tkt-${{ linear.data.identifier }}
        condition:
          type: string
          example: linear.data.state.name == 'Done'
        sampleId:
          type: string
          description: Id of a built-in sample event.
          example: issue.status_changed
        event:
          type: string
          description: A raw event envelope JSON string (alternative to sampleId).
    TemplateTestResponse:
      type: object
      description: Result of rendering a template + evaluating a condition.
      properties:
        name:
          type: string
          description: The rendered channel name (empty if no template / on error).
        conditionResult:
          type: boolean
          description: Whether the condition evaluated true.
        error:
          type: string
          description: A template/condition error, if any (shown inline by the UI).
      required:
        - name
        - conditionResult
