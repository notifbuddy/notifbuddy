openapi: 3.0.3
info:
  title: Xolo Ping API
  description: |
    A minimal spec-first ping/pong API with WorkOS AuthKit authentication. This
    file is the single source of truth for both the Go server stub (generated by
    ogen) and the TypeScript client (generated by openapi-typescript).

    Note: the browser-redirect auth routes (`GET /auth/login`, `GET /auth/callback`,
    `GET /auth/logout`) are intentionally NOT modelled here. They are 302 redirect
    flows that set/clear an HttpOnly session cookie, not JSON operations, so they
    live as plain net/http handlers alongside the generated server. Only the JSON
    API (the operations below) is spec-driven.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /ping:
    get:
      operationId: ping
      summary: Ping the server
      description: |
        Returns a pong message. Requires an authenticated session — the request
        must carry a valid `wos_session` cookie. Used to verify the end-to-end
        authenticated transport.
      responses:
        "200":
          description: A pong response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PongResponse"
        "401":
          description: No valid session — the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Complete email-verification during login
      description: |
        Some providers (notably GitHub OAuth) return an unverified email on first
        login, so WorkOS requires email verification before issuing a session. The
        `/auth/callback` handler detects this, stores the WorkOS
        `pending_authentication_token` in a short-lived sealed cookie, and sends
        the browser to the SPA's verification step. The SPA collects the code
        WorkOS emailed and POSTs it here to finish authentication and establish
        the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailRequest"
      responses:
        "200":
          description: Verification succeeded; the session cookie is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: |
            No pending verification, an expired/invalid pending token, or a wrong
            verification code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /me:
    get:
      operationId: getMe
      summary: Get the current user
      description: |
        Returns the WorkOS user backing the current session. Requires a valid
        `wos_session` cookie; returns 401 when unauthenticated. The SPA calls this
        on load to decide whether to show the signed-in or signed-out UI.
      responses:
        "200":
          description: The authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: No valid session — the caller is not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/pending-orgs:
    get:
      operationId: getPendingOrgs
      summary: List organizations awaiting selection
      description: |
        During the org-selection step the SPA calls this to read the organizations
        the user may choose between. The choices were stashed by `/auth/callback`
        in a short-lived sealed cookie. Returns 401 if there is no pending
        selection.
      responses:
        "200":
          description: The organizations to choose from.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingOrganizations"
        "401":
          description: No pending organization selection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /auth/select-org:
    post:
      operationId: selectOrg
      summary: Complete login by choosing an organization
      description: |
        Finishes a login that WorkOS gated on organization selection. Exchanges
        the chosen organization plus the stashed pending token for a session,
        sets the session cookie, and returns the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectOrgRequest"
      responses:
        "200":
          description: Selection succeeded; the session cookie is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: No pending selection, or an invalid/expired pending token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /invitations:
    get:
      operationId: listInvitations
      summary: List the active organization's invitations
      description: |
        Returns the invitations for the caller's active organization. Requires a
        session scoped to an organization.
      responses:
        "200":
          description: The organization's invitations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createInvitation
      summary: Invite an email to the active organization
      description: |
        Sends a WorkOS invitation for the given email to the caller's active
        organization (optionally with a role). WorkOS emails the invitee a link;
        accepting it (by logging in with the invitation token) creates their
        membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "200":
          description: The created invitation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: The request was invalid (e.g. no active organization).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /members:
    get:
      operationId: listMembers
      summary: List the active organization's members
      description: |
        Returns the active members of the caller's active organization, resolved
        from WorkOS organization memberships. Requires a session scoped to an
        organization.
      responses:
        "200":
          description: The organization's members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/status:
    get:
      operationId: getIntegrationStatus
      summary: Integration connection status for the active organization
      description: |
        Returns the connection state of each supported integration (GitHub,
        Slack, Linear) for the caller's active organization. Drives the
        integrations settings view. The actual connect/callback flows are
        browser redirects (GET /integrations/{provider}/connect) and are not
        part of this JSON spec.
      responses:
        "200":
          description: Per-provider connection status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatusResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/{provider}/disconnect:
    post:
      operationId: disconnectIntegration
      summary: Disconnect an integration from the active organization
      description: |
        Removes the stored installation/token for the given provider at the given
        level. level=workspace (default) removes the org-wide connection;
        level=user removes only the caller's own per-user connection.
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, slack, linear]
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [workspace, user]
            default: workspace
      responses:
        "200":
          description: Disconnected (or was already not connected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationStatusResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/github/webhooks:
    get:
      operationId: listGithubWebhooks
      summary: Recent GitHub webhook deliveries for the active organization
      description: |
        Returns the GitHub webhook events we have received and stored for the
        caller's active organization, newest first. Events are stored when GitHub
        delivers them to POST /integrations/github/webhook (a browser-external
        redirect-style route, not part of this JSON spec).
      responses:
        "200":
          description: Recent webhook events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/webhooks:
    get:
      operationId: listLinearWebhooks
      summary: Recent Linear webhook deliveries for the active organization
      description: |
        Returns the Linear webhook events we have received and stored for the
        caller's active organization, newest first. Events are stored when Linear
        delivers them to POST /integrations/linear/webhook (a browser-external
        redirect-style route, not part of this JSON spec).
      responses:
        "200":
          description: Recent webhook events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/settings:
    get:
      operationId: getLinearSettings
      summary: Linear channel-creation configs for the active organization
      description: |
        Returns all of the org's Linear → Slack channel-creation configs, whether
        Linear is connected at the workspace level, the org's synced Linear teams
        and their workflow states (for the team picker + status dropdown), and the
        built-in sample events for the test panel.
      responses:
        "200":
          description: Current configs + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createLinearSettings
      summary: Create a Linear channel-creation config
      description: |
        Creates a new config. The name template and condition are validated
        (parsed) before saving; a malformed template — or a team already used by
        another config — returns 400. Returns the refreshed configs + context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinearSettings"
      responses:
        "200":
          description: Created; returns the refreshed configs + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid config (bad template/condition, or a team conflict).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/settings/{settingId}:
    put:
      operationId: updateLinearSettings
      summary: Update a Linear channel-creation config
      description: |
        Updates the config identified by settingId. Same validation as create; a
        team already used by another config returns 400. Returns the refreshed
        configs + context.
      parameters:
        - name: settingId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinearSettings"
      responses:
        "200":
          description: Updated; returns the refreshed configs + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Invalid config (bad template/condition, or a team conflict).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No such config for this org.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteLinearSettings
      summary: Delete a Linear channel-creation config
      description: Removes the config (and its team mappings). Returns the refreshed configs + context.
      parameters:
        - name: settingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted; returns the refreshed configs + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/settings/sync:
    post:
      operationId: syncSettings
      summary: Re-sync Linear teams/statuses and Slack members
      description: |
        Fetches Linear team workflow states AND Slack workspace members (bots +
        humans) in parallel and replaces the stored snapshots. Returns the
        refreshed configs + context (updated teams and members). Backs the "Sync"
        button in the settings UI, for when new statuses/members aren't showing yet.
      responses:
        "200":
          description: Synced; returns the refreshed configs + context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinearSettingsResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /integrations/linear/settings/test:
    post:
      operationId: testLinearTemplate
      summary: Test a name template + condition against a sample or pasted event
      description: |
        Renders nameTemplate and evaluates condition against the supplied event.
        Provide either a sampleId (one of the built-in sample events) or a raw
        event JSON string. Returns the rendered name, the condition result, and
        any template error (template errors are returned in-body, not as 4xx, so
        the UI can show them inline).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateTestRequest"
      responses:
        "200":
          description: Test result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateTestResponse"
        "402":
          description: Billing locked — the trial has expired and there is no subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Neither sampleId nor a valid event was provided.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing:
    get:
      operationId: getBilling
      summary: Billing status for the active organization
      description: |
        Returns the active organization's billing state: plan, whether features
        are locked, the trial deadline, and Stripe subscription facts. Lazily
        starts the 21-day trial on the org's first touch. When the org has an
        active subscription this also reconciles the Stripe seat quantity with
        the current member count. The Stripe webhook
        (POST /billing/stripe/webhook) and the WorkOS membership webhook
        (POST /auth/workos/webhook) are signature-verified raw routes and not
        part of this JSON spec.
      responses:
        "200":
          description: The organization's billing status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatusResponse"
        "400":
          description: The session has no active organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/checkout:
    post:
      operationId: createBillingCheckout
      summary: Start a Stripe Checkout session for the Pro plan
      description: |
        Creates a Stripe Checkout session (subscription mode) for the Pro plan
        at the current member count and returns its URL for the browser to
        redirect to. 409 when the organization already has a live subscription.
      responses:
        "200":
          description: The Checkout session to redirect to.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingRedirectResponse"
        "400":
          description: No active organization, or billing is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: The organization already has a live subscription.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/portal:
    post:
      operationId: createBillingPortal
      summary: Open the Stripe Customer Portal
      description: |
        Creates a Stripe Billing Portal session for the organization's customer
        (card updates, cancellation, invoices) and returns its URL. 400 when the
        organization has never checked out (no Stripe customer yet).
      responses:
        "200":
          description: The portal session to redirect to.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingRedirectResponse"
        "400":
          description: |
            No active organization, billing is not configured, or the
            organization has no Stripe customer yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /billing/oss-application:
    post:
      operationId: submitOssApplication
      summary: Apply for the free open-source tier
      description: |
        Records an application for the free-forever open-source tier: a sponsor
        URL (the open-source repo or sponsorship page) plus an optional note.
        Free usage requires the project to display a "Sponsored by NotifBuddy"
        tag on its README; reviewers check for it by hand. The
        application status is reported by GET /billing. 409 when the org is
        already approved or has a live subscription.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OssApplicationRequest"
      responses:
        "200":
          description: Application recorded; the refreshed billing status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatusResponse"
        "400":
          description: No active organization, or a missing/invalid sponsor URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: No valid session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already approved, or a live subscription exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    PongResponse:
      type: object
      description: The response returned by the ping endpoint.
      properties:
        message:
          type: string
          description: Always the literal string "pong".
          example: pong
      required:
        - message
    UserResponse:
      type: object
      description: The authenticated WorkOS user and their active organization context.
      properties:
        id:
          type: string
          description: The WorkOS user ID.
          example: user_01H...
        email:
          type: string
          description: The user's email address.
          example: jane@example.com
        firstName:
          type: string
          description: The user's first name, if set.
          example: Jane
        lastName:
          type: string
          description: The user's last name, if set.
          example: Doe
        profilePictureUrl:
          type: string
          description: >-
            URL of the user's profile picture, if any. For GitHub logins this is
            the user's GitHub avatar, captured by WorkOS at sign-in.
          example: https://avatars.githubusercontent.com/u/12345?v=4
        organizationId:
          type: string
          description: The ID of the organization the current session is scoped to, if any.
          example: org_01H...
        role:
          type: string
          description: The user's role within the active organization, if any.
          example: admin
        organizations:
          type: array
          description: All organizations the user is a member of.
          items:
            $ref: "#/components/schemas/Organization"
        billing:
          $ref: "#/components/schemas/BillingSummary"
      required:
        - id
        - email
    BillingSummary:
      type: object
      description: |
        The active organization's billing state, embedded in /me so the SPA can
        show the trial banner / lock screen without an extra request.
      properties:
        plan:
          type: string
          description: The organization's plan.
          enum: [trial, pro, oss_free, enterprise]
          example: trial
        locked:
          type: boolean
          description: Whether features are locked (trial expired, no subscription).
        trialEndsAt:
          type: string
          format: date-time
          description: When the 21-day trial ends/ended.
          example: "2026-07-28T00:00:00Z"
      required:
        - plan
        - locked
        - trialEndsAt
    BillingStatusResponse:
      type: object
      description: The active organization's full billing status.
      properties:
        plan:
          type: string
          description: The organization's plan.
          enum: [trial, pro, oss_free, enterprise]
          example: trial
        locked:
          type: boolean
          description: Whether features are locked (trial expired, no subscription).
        trialEndsAt:
          type: string
          format: date-time
          description: When the 21-day trial ends/ended.
          example: "2026-07-28T00:00:00Z"
        subscribed:
          type: boolean
          description: Whether a live (non-canceled) Stripe subscription exists.
        stripeStatus:
          type: string
          description: The raw Stripe subscription status, once subscribed.
          example: active
        seats:
          type: integer
          description: The seat quantity on the Stripe subscription, once subscribed.
          example: 5
        priceCentsPerSeat:
          type: integer
          description: The Pro price in cents per member per month.
          example: 999
        ossApplicationStatus:
          type: string
          description: The open-source application state, if one was submitted.
          enum: [pending, approved, rejected]
          example: pending
      required:
        - plan
        - locked
        - trialEndsAt
        - subscribed
        - priceCentsPerSeat
    BillingRedirectResponse:
      type: object
      description: A Stripe-hosted page (Checkout or Billing Portal) to redirect to.
      properties:
        url:
          type: string
          description: The URL the browser should navigate to.
          example: https://checkout.stripe.com/c/pay/cs_test_...
      required:
        - url
    OssApplicationRequest:
      type: object
      description: An application for the free open-source tier.
      properties:
        sponsorUrl:
          type: string
          description: Link to the open-source repo or sponsorship page.
          example: https://github.com/acme/widget
        note:
          type: string
          description: Optional context for the reviewer.
          example: Maintainers of the widget project, ~40 contributors.
      required:
        - sponsorUrl
    Organization:
      type: object
      description: A WorkOS organization the user belongs to.
      properties:
        id:
          type: string
          description: The WorkOS organization ID.
          example: org_01H...
        name:
          type: string
          description: The organization's display name.
          example: Acme Inc
        role:
          type: string
          description: The user's role in this organization, if known.
          example: member
      required:
        - id
        - name
    VerifyEmailRequest:
      type: object
      description: The verification code the user received by email.
      properties:
        code:
          type: string
          description: The one-time verification code WorkOS emailed to the user.
          example: "123456"
      required:
        - code
    SelectOrgRequest:
      type: object
      description: The organization the user chose during the org-selection step.
      properties:
        organizationId:
          type: string
          description: The ID of the organization to authenticate into.
          example: org_01H...
      required:
        - organizationId
    PendingOrganizations:
      type: object
      description: The organizations a user may choose between during org selection.
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
      required:
        - organizations
    CreateInvitationRequest:
      type: object
      description: Invite an email address to the caller's active organization.
      properties:
        email:
          type: string
          description: The email address to invite.
          example: newteammate@example.com
        role:
          type: string
          description: Optional role slug to grant the invitee on acceptance.
          example: member
      required:
        - email
    InvitationResponse:
      type: object
      description: A WorkOS organization invitation.
      properties:
        id:
          type: string
          example: invitation_01H...
        email:
          type: string
          example: newteammate@example.com
        state:
          type: string
          description: The invitation state (pending, accepted, expired, revoked).
          example: pending
        expiresAt:
          type: string
          description: ISO 8601 expiry timestamp.
          example: "2026-07-03T00:00:00Z"
      required:
        - id
        - email
        - state
    InvitationListResponse:
      type: object
      description: A list of invitations for the active organization.
      properties:
        invitations:
          type: array
          items:
            $ref: "#/components/schemas/InvitationResponse"
      required:
        - invitations
    MemberResponse:
      type: object
      description: A member of the active organization (a WorkOS organization membership).
      properties:
        id:
          type: string
          description: The WorkOS organization membership ID.
          example: om_01H...
        userId:
          type: string
          description: The WorkOS user ID of the member.
          example: user_01H...
        email:
          type: string
          description: The member's email address.
          example: jane@example.com
        firstName:
          type: string
          description: The member's first name, if set.
          example: Jane
        lastName:
          type: string
          description: The member's last name, if set.
          example: Doe
        role:
          type: string
          description: The member's role slug within the organization, if any.
          example: admin
      required:
        - id
        - userId
        - email
    MemberListResponse:
      type: object
      description: A list of members for the active organization.
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/MemberResponse"
      required:
        - members
    IntegrationStatus:
      type: object
      description: The connection state of a single integration provider at one level.
      properties:
        provider:
          type: string
          description: The provider key.
          example: github
        level:
          type: string
          description: |
            Whether this entry is the organization's workspace-wide connection or
            the caller's own per-user connection.
          enum: [workspace, user]
          example: workspace
        connected:
          type: boolean
          description: Whether this provider is connected at this level.
        account:
          type: string
          description: The connected account/workspace label (GitHub login, Slack team).
          example: acme
        connectedBy:
          type: string
          description: The WorkOS user id who connected it, if known.
          example: user_01H...
      required:
        - provider
        - level
        - connected
    IntegrationStatusResponse:
      type: object
      description: Connection status for every supported integration.
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationStatus"
        configured:
          type: boolean
          description: Whether the integration service is configured (database available) on the server.
      required:
        - integrations
        - configured
    WebhookEvent:
      type: object
      description: A stored GitHub webhook delivery.
      properties:
        deliveryId:
          type: string
          description: The X-GitHub-Delivery id (unique per delivery).
          example: 12345678-1234-1234-1234-123456789012
        eventType:
          type: string
          description: The X-GitHub-Event type.
          example: push
        action:
          type: string
          description: The payload action, when present.
          example: opened
        receivedAt:
          type: string
          description: ISO 8601 timestamp when we received it.
          example: "2026-06-26T12:00:00Z"
        payload:
          type: string
          description: The raw webhook JSON payload (as a string).
      required:
        - deliveryId
        - eventType
        - receivedAt
    WebhookListResponse:
      type: object
      description: Recent webhook events for the active organization.
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEvent"
      required:
        - events
    Error:
      type: object
      description: A generic error response.
      properties:
        message:
          type: string
          description: A human-readable description of the error.
          example: unauthorized
      required:
        - message
    LinearSettings:
      type: object
      description: |
        A Linear → Slack channel-creation config scoped to a single Linear team
        (teamId). The team is the config's identity; a team has at most one config.
      properties:
        settingId:
          type: string
          description: |
            Stable id of this config. Omitted/empty when creating; returned on read
            and required in the URL for update/delete.
          example: 4b2f6c1e-2a3d-4e5f-8a9b-0c1d2e3f4a5b
        creationMode:
          type: string
          description: |
            'status' auto-creates a channel when an issue reaches triggerStatus;
            'condition' auto-creates when conditionExpr evaluates true;
            'manual' only creates via @notifbuddy.
          enum: [status, manual, condition]
          example: manual
        triggerStatus:
          type: string
          description: Linear workflow state name that triggers creation (status mode).
          example: In Progress
        nameTemplate:
          type: string
          description: GitHub-Actions-expression template for the channel name.
          example: tkt-${{ linear.data.identifier }}
        conditionExpr:
          type: string
          description: GitHub-Actions-expression that must be true for creation.
          example: linear.action == 'update'
        autoAddMembers:
          type: array
          description: Slack member ids (U…) — bots and people — to auto-add on channel creation.
          items:
            type: string
          example: ["U0123BOT", "U0456HUMAN"]
        teamId:
          type: string
          description: The Linear team this config applies to.
          example: ac4c7f2d-98ae-438f-b85a-33374856fd1b
      required:
        - creationMode
        - autoAddMembers
        - teamId
    SampleEvent:
      type: object
      description: A built-in example event for the settings test panel.
      properties:
        id:
          type: string
          example: issue.status_changed
        label:
          type: string
          example: "issue: status changed"
        raw:
          type: string
          description: The event envelope JSON (as a string).
      required:
        - id
        - label
        - raw
    LinearWorkflowState:
      type: object
      description: One workflow state (issue status) of a Linear team.
      properties:
        id:
          type: string
          example: 065a2424-81d9-479d-84b8-ea8b1f20cf67
        name:
          type: string
          example: In Progress
        type:
          type: string
          description: Linear's state category (e.g. backlog, unstarted, started, completed, canceled).
          example: started
        color:
          type: string
          example: "#5e6ad2"
      required:
        - id
        - name
        - type
    LinearTeamState:
      type: object
      description: A Linear team plus its synced workflow states.
      properties:
        teamId:
          type: string
          example: ac4c7f2d-98ae-438f-b85a-33374856fd1b
        teamKey:
          type: string
          example: SKO
        teamName:
          type: string
          example: SkogAI
        states:
          type: array
          items:
            $ref: "#/components/schemas/LinearWorkflowState"
      required:
        - teamId
        - teamName
        - states
    SlackMember:
      type: object
      description: A synced Slack workspace member (bot/app or human).
      properties:
        memberId:
          type: string
          description: Slack member id (U…); what conversations.invite needs.
          example: U0123BOT
        name:
          type: string
          description: Display/real name, falling back to the handle.
          example: Claude
        iconUrl:
          type: string
          example: https://example.com/avatar.png
        isBot:
          type: boolean
      required:
        - memberId
        - name
        - isBot
    LinearSettingsResponse:
      type: object
      description: All of an org's Linear configs plus context for the settings UI.
      properties:
        connected:
          type: boolean
          description: Whether Linear is connected at the workspace level.
        configs:
          type: array
          description: The org's named channel-creation configs.
          items:
            $ref: "#/components/schemas/LinearSettings"
        teams:
          type: array
          description: |
            Synced Linear teams and their workflow states, for the "applies to"
            team picker and the trigger-status dropdown.
          items:
            $ref: "#/components/schemas/LinearTeamState"
        slackMembers:
          type: array
          description: |
            Synced Slack workspace members (bots + humans), for the auto-add
            bot/member pickers.
          items:
            $ref: "#/components/schemas/SlackMember"
        sampleEvents:
          type: array
          items:
            $ref: "#/components/schemas/SampleEvent"
      required:
        - connected
        - configs
        - teams
        - slackMembers
        - sampleEvents
    TemplateTestRequest:
      type: object
      description: |
        A template-test request. Provide exactly one event source: sampleId
        (a built-in sample event) or event (a raw envelope JSON string).
      properties:
        nameTemplate:
          type: string
          example: tkt-${{ linear.data.identifier }}
        condition:
          type: string
          example: linear.data.state.name == 'Done'
        sampleId:
          type: string
          description: Id of a built-in sample event.
          example: issue.status_changed
        event:
          type: string
          description: A raw event envelope JSON string (alternative to sampleId).
    TemplateTestResponse:
      type: object
      description: Result of rendering a template + evaluating a condition.
      properties:
        name:
          type: string
          description: The rendered channel name (empty if no template / on error).
        conditionResult:
          type: boolean
          description: Whether the condition evaluated true.
        error:
          type: string
          description: A template/condition error, if any (shown inline by the UI).
      required:
        - name
        - conditionResult
