openapi: 3.0.3
info:
  title: NotifBuddy Waitlist API
  description: |
    The pre-launch waitlist service. This is a deliberately separate, tiny
    backend so the marketing landing page can go live before the product
    backend is deployed: one public endpoint backed by its own Neon Postgres
    database (`notifbuddy-waitlist`). Spec-first like the main API — this file
    generates the Go server stub (ogen) in waitlist-backend/ and the TypeScript
    client types used by the landing page's form.
  version: 1.0.0
servers:
  - url: http://localhost:8081
    description: Local development server
paths:
  /waitlist:
    post:
      operationId: joinWaitlist
      summary: Join the pre-launch waitlist
      description: |
        Public, unauthenticated. Stores an email address from the marketing
        landing page's waitlist form. Idempotent — submitting an address that is
        already on the list succeeds again rather than erroring, so the form
        never punishes a double-click or a returning visitor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaitlistRequest"
      responses:
        "200":
          description: The email is on the waitlist (newly added or already present).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistResponse"
        "400":
          description: Missing or malformed email address.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    WaitlistRequest:
      type: object
      description: A request to join the pre-launch waitlist.
      properties:
        email:
          type: string
          maxLength: 254
          description: The email address to notify at launch.
          example: ada@lovelace.dev
      required:
        - email
    WaitlistResponse:
      type: object
      description: Confirmation that the email is on the waitlist.
      properties:
        message:
          type: string
          description: A human-readable confirmation.
          example: you're on the list
      required:
        - message
    Error:
      type: object
      description: A generic error response.
      properties:
        message:
          type: string
          description: A human-readable description of the error.
          example: enter a valid email address
      required:
        - message
