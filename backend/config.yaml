# Backend configuration for Xolo.
#
# Non-sensitive values are set literally here. SENSITIVE values reference an
# environment variable with `$VAR` or `${VAR}` — these are resolved at startup
# and a referenced-but-unset variable is a hard error. This keeps real secrets
# out of the committed file; set them in backend/.env (auto-loaded) or the real
# environment.
#
# Override the config path with CONFIG_FILE=/path/to/config.yaml.

server:
  addr: ":8080" # listen address

cors:
  allow_origin: "http://localhost:5173" # exact SPA origin (credentialed CORS: no "*")

workos:
  client_id: "client_01KW191FHXJTNC0X9X9W39DWMX"
  api_key: "${WORKOS_API_KEY}" # SECRET — resolved from env
  cookie_password: "${WORKOS_COOKIE_PASSWORD}" # SECRET — resolved from env (>=32 chars)
  redirect_uri: "http://localhost:8080/auth/callback" # must match a dashboard redirect
  login_provider: "GitHubOAuth" # skip AuthKit selector; required for single-provider setups. "" to show selector.

app:
  post_login_url: "http://localhost:5173" # where the browser lands after login/logout
  insecure_cookies: false # true only for plain-HTTP testing on a non-localhost host

database:
  url: "${DATABASE_URL}" # Postgres connection string (secret-ish; from env). Empty disables integrations.

encryption:
  provider: "local" # "local" (AES-GCM) or "kms" (customer-managed key)
  local_key: "${INTEGRATION_ENC_KEY}" # base64 32-byte key for provider=local; empty = ephemeral dev key
  kms_key_id: "" # key ID/ARN for provider=kms (wire a KMSClient in buildEncryptor)

pubsub:
  provider: "memory" # "memory" (in-process bus, local) or "sns" (wire an SNS client in buildPublisher)
  sns_topic_arn: "" # SNS topic ARN for the webhook event topic when provider=sns

github:
  app_slug: "notifbuddy-local" # github.com/apps/<slug>
  app_id: "4151532" # numeric GitHub App ID
  client_id: "Iv23li54M6KJDfbqwvtu  " # App OAuth client id
  client_secret: "${GITHUB_APP_CLIENT_SECRET}" # SECRET
  private_key: "${GITHUB_APP_PRIVATE_KEY}" # SECRET — PEM contents, used to mint installation tokens
  webhook_secret: "${GITHUB_WEBHOOK_SECRET}" # SECRET — verifies X-Hub-Signature-256; empty disables verification
  callback_url: "http://localhost:8080/integrations/github/callback"
  # User-level (user-to-server) connection: scopes requested when a user connects
  # their own GitHub account (acts as the user for two-way sync). Empty is valid.
  user_scopes:
    - repo
    - read:user
  user_callback_url: "http://localhost:8080/integrations/github/callback" # user-to-server redirect

slack:
  client_id: "11457434980017.11440212651047" # Slack app client id
  client_secret: "${SLACK_CLIENT_SECRET}" # SECRET
  # Bot scopes (modeled on Axolo's channel-per-PR app). Trim here + in the README manifest to match what you use.
  scopes:
    - app_mentions:read
    - channels:manage
    - channels:history
    - channels:read
    - commands
    - groups:history
    - groups:write
    - reactions:write
    - chat:write
    - chat:write.public
    - chat:write.customize # post as the bot but display a per-message name/avatar (attribution)
    - im:history
    - im:read
    - im:write
    - users:read
    - users:read.email # resolve a comment author's Slack identity for attribution
    - reactions:read
    - emoji:read
  # User-level connection: user-token scopes (the xoxp token under authed_user),
  # used to post/act as the connecting user for two-way sync.
  user_scopes:
    - chat:write
    - channels:write
  callback_url: "http://localhost:8080/integrations/slack/callback"
  # Verifies inbound Slack Events API requests (X-Slack-Signature). SECRET.
  # Empty disables verification (and the Slack → Linear sync direction).
  signing_secret: "${SLACK_SIGNING_SECRET}"

linear:
  client_id: "c7a330b6ba19f5ba1489ef509fa10516" # Linear OAuth application client id (public; may be inlined)
  client_secret: "${LINEAR_CLIENT_SECRET}" # SECRET
  # OAuth scopes. read+write lets the app view and create/update issues/comments.
  scopes:
    - read
    - write
  callback_url: "http://localhost:8080/integrations/linear/callback"
  webhook_secret: "${LINEAR_WEBHOOK_SECRET}" # SECRET — verifies Linear-Signature HMAC; empty disables verification

cloudflare:
  # Workers AI powers NotifBuddy's @mention intent parsing (create-channel /
  # close-channel / no-action). Empty credentials disable it: every comment then
  # resolves to "no-action".
  account_id: "${CF_ACCOUNT_ID}" # Cloudflare account id running Workers AI
  api_token: "${CF_API_TOKEN}" # SECRET — Bearer token for the Workers AI REST API
  model: "@cf/meta/llama-3.1-8b-instruct" # text-generation model id; swappable
