# Slack app manifest — local development instance.
# Paste into api.slack.com/apps → App Manifest for the notifbuddy-local app.
# Bot scopes must stay in sync with slack.scopes in config/backend/local.yaml; adding a
# scope here requires reinstalling the app to the dev workspace.
display_information:
  name: notifbuddy-local
  description: notifbuddy local development — two-way Linear ⇄ Slack sync (dev instance, not the marketplace app)
  background_color: "#2a2925"
features:
  bot_user:
    display_name: notifbuddy-local
    always_online: false
oauth_config:
  redirect_urls:
    - http://localhost:8080/integrations/slack/callback
  scopes:
    user:
      - chat:write
      - channels:write
    bot:
      - app_mentions:read
      - channels:manage
      - channels:history
      - channels:read
      - commands
      - groups:history
      - groups:write
      - reactions:write
      - chat:write
      - chat:write.public
      - chat:write.customize
      - files:read # download a message's attachments to mirror into Linear
      - files:write # share mirrored Linear attachments into the channel
      - im:history
      - im:read
      - im:write
      - users:read
      - users:read.email
      - reactions:read
      - emoji:read
  pkce_enabled: false
settings:
  event_subscriptions:
    # Your personal dev tunnel (same host as PUBLIC_BASE_URL in backend/.env).
    request_url: https://your-dev-tunnel.example.com/integrations/slack/webhook
    bot_events:
      - app_mention
      - message.channels
      - message.groups
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
