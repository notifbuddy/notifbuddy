# PRODUCTION backend configuration for NotifBuddy.
#
# Same shape as config.local.yaml, but with production URLs/origins. Sensitive
# values still reference env vars (`${VAR}`), resolved at startup — a referenced-
# but-unset variable is a hard error. Select this file with
# CONFIG_FILE=config.prod.yaml (the Docker image / Cloud Run sets this).
#
# ⚠️ FILL IN THE PLACEHOLDER URLs after `infra apply` allocates the Cloud Run
#    URL (infra output backend_url) and you know the prod frontend origin.
#    Every OAuth redirect/callback below must also be registered in the
#    respective provider dashboards (WorkOS, Slack app, Linear app).

server:
  addr: ":8080" # Cloud Run routes $PORT (default 8080) to this

logging:
  format: "json" # one JSON object per line on stdout — Datadog parses level/msg/timestamp
  level: "info"

cors:
  allow_origin: "https://app.notifbuddy.com" # TODO: exact prod SPA origin (credentialed CORS: no "*")

workos:
  client_id: "${WORKOS_CLIENT_ID}"
  api_key: "${WORKOS_API_KEY}" # SECRET
  cookie_password: "${WORKOS_COOKIE_PASSWORD}" # SECRET (>=32 chars)
  redirect_uri: "https://api.notifbuddy.com/auth/callback" # TODO: prod backend base + /auth/callback; must match a WorkOS dashboard redirect
  login_provider: "GitHubOAuth"
  webhook_secret: "${WORKOS_WEBHOOK_SECRET}" # SECRET — verifies WorkOS-Signature (membership events → seat sync)

app:
  post_login_url: "https://app.notifbuddy.com" # TODO: prod frontend URL the browser lands on after login/logout
  insecure_cookies: false # keep false in prod (HTTPS only)

database:
  url: "${DATABASE_URL}" # injected by infra from the Neon connection string

encryption:
  # Google Cloud KMS via the Cloud Run runtime SA (ADC). The key is created by
  # infra and must be applied BEFORE deploying this config. Cutover from
  # provider="local" invalidates previously stored tokens (they were sealed
  # with the old env-var key) — reconnect the integrations after switching.
  provider: "gcpkms"
  local_key: "" # unused with provider=gcpkms; INTEGRATION_ENC_KEY env no longer needed
  kms_key_id: "${KMS_KEY_ID}" # resource name, not a secret (infra output kms_key_id)

pubsub:
  # Pub/Sub push keeps Cloud Run + Neon scale-to-zero (no polling). Requires
  # infra applied (topics/subscriptions/IAM) BEFORE deploying this.
  provider: "gcp"
  gcp:
    project_id: "${GCP_PROJECT_ID}"
    push_audience: "https://api.notifbuddy.com/internal/pubsub/push" # OIDC audience = push endpoint URL
    push_service_account: "${PUBSUB_PUSH_SA}" # see infra

slack:
  client_id: "11457434980017.11440212651047" # TODO: prod Slack app client id
  client_secret: "${SLACK_CLIENT_SECRET}" # SECRET
  scopes:
    - app_mentions:read
    - channels:manage
    - channels:history
    - channels:read
    - commands
    - groups:history
    - groups:write
    - reactions:write
    - chat:write
    - chat:write.public
    - chat:write.customize
    - im:history
    - im:read
    - im:write
    - users:read
    - users:read.email
    - reactions:read
    - emoji:read
  user_scopes:
    - chat:write
    - channels:write
  callback_url: "https://api.notifbuddy.com/integrations/slack/callback" # TODO: prod backend base
  signing_secret: "${SLACK_SIGNING_SECRET}" # SECRET

linear:
  client_id: "c7a330b6ba19f5ba1489ef509fa10516" # TODO: prod Linear OAuth app client id
  client_secret: "${LINEAR_CLIENT_SECRET}" # SECRET
  scopes:
    - read
    - write
  callback_url: "https://api.notifbuddy.com/integrations/linear/callback" # TODO: prod backend base
  webhook_secret: "${LINEAR_WEBHOOK_SECRET}" # SECRET

cloudflare:
  account_id: "${CF_ACCOUNT_ID}" # TODO: prod Cloudflare account id
  api_token: "${CF_API_TOKEN}" # SECRET
  model: "@cf/meta/llama-3.1-8b-instruct"

stripe:
  api_key: "${STRIPE_API_KEY}" # SECRET — live restricted key (rk_live_...)
  webhook_secret: "${STRIPE_WEBHOOK_SECRET}" # SECRET — from the dashboard webhook endpoint
  price_id: "" # TODO: live per-seat monthly Price (price_...) for NotifBuddy Pro
