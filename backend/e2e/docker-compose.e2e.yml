# End-to-end test stack for NotifBuddy.
#
#   ./run.sh                # backend Go suite, exit with its code
#   ./run-ui.sh             # dashboard Playwright suite, exit with its code
#   docker compose -f docker-compose.e2e.yml down -v   # tear down
#
# Shared services on one network:
#   postgres  — throwaway DB (tmpfs; wiped every run)
#   fakeapis  — TLS-terminating egress proxy + third-party API fakes; also mints
#               the forged session cookie the UI suite authenticates with
#   backend   — the real server; HTTPS_PROXY -> fakeapis, trusts its CA
#
# Two test runners, one per profile (so each run.sh spins up only its own):
#   tests (profile: backend) — the e2e-tagged Go suite, run against backend:8080
#   ui    (profile: ui)      — the SvelteKit dashboard Playwright suite, run in a
#                              browser against the real backend on localhost:8080
#
# Outbound SDK traffic (Linear/GitHub as wired) is captured by fakeapis instead
# of reaching the internet — the backend keeps using the real SDKs against the
# real hostnames, we just intercept at the network. authd is first-party, so
# the backend reaches fakeapis' authd fake directly (AUTHD_BASE_URL), not
# through the proxy.
#
# The session-token secret MUST be identical for fakeapis (verifies) and the
# tests (forge); both read the same SESSION_SECRET anchor below.
name: notifbuddy-e2e

x-session-secret: &session_secret "e2e-session-secret-0123456789-abcdefgh"
x-linear-secret: &linear_secret "e2e-linear-webhook-secret"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: notifbuddy
      POSTGRES_PASSWORD: notifbuddy
      POSTGRES_DB: notifbuddy
    tmpfs:
      - /var/lib/postgresql/data # ephemeral: fast + clean per run
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifbuddy -d notifbuddy"]
      interval: 2s
      timeout: 3s
      retries: 30

  fakeapis:
    build:
      context: .. # backend/ — shares the backend Go module
      dockerfile: e2e/Dockerfile.fakeapis
    environment:
      FAKEAPIS_ADDR: ":8888"
      FAKEAPIS_CA_OUT: /certs/ca.pem # backend mounts + trusts this
      FAKEAPIS_SESSION_OUT: /certs/session.json # forged cookie for the UI suite
      E2E_SESSION_SECRET: *session_secret # signs the minted session tokens
    volumes:
      - certs:/certs # share the minted CA + session cookie with the others
    healthcheck:
      # Healthy once the proxy is up — which is after the CA has been written.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/healthz"]
      interval: 2s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ../.. # repo root — matches backend/Dockerfile
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      fakeapis:
        condition: service_healthy # CA present before the first outbound call
    environment:
      CONFIG_FILE: /app/config/backend/e2e.yaml
      NB_ENV: e2e
      AUTHD_BASE_URL: http://fakeapis:8888 # fakeapis' authd fake (direct; NO_PROXY covers it)
      DATABASE_URL: postgres://notifbuddy:notifbuddy@postgres:5432/notifbuddy?sslmode=disable
      INTEGRATION_ENC_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY= # base64 of a fixed 32-byte key
      LINEAR_WEBHOOK_SECRET: *linear_secret
      SLACK_CLIENT_SECRET: e2e-slack-client-secret # only presence matters (enables connect)
      SLACK_SIGNING_SECRET: e2e-slack-signing-secret # required by validate() once client_secret is set
      # Route all outbound SDK HTTPS through the fakeapis MITM proxy and trust
      # only its CA. NO_PROXY keeps intra-network + loopback traffic direct.
      HTTPS_PROXY: http://fakeapis:8888
      HTTP_PROXY: http://fakeapis:8888
      NO_PROXY: postgres,fakeapis,backend,localhost,127.0.0.1
      SSL_CERT_FILE: /certs/ca.pem
    volumes:
      - ../../config/backend/e2e.yaml:/app/config/backend/e2e.yaml:ro
      - certs:/certs:ro # read the CA minted by fakeapis

  # Backend Go e2e suite. Behind the "backend" profile so a UI-only run
  # (run-ui.sh) doesn't also spin it up.
  tests:
    profiles: ["backend"]
    build:
      context: .. # backend/ — shares the backend Go module
      dockerfile: e2e/Dockerfile.tests
    depends_on:
      backend:
        condition: service_started
    environment:
      E2E_BASE_URL: http://backend:8080
      E2E_SESSION_SECRET: *session_secret
      LINEAR_WEBHOOK_SECRET: *linear_secret

  # Dashboard (SvelteKit SPA) Playwright suite. Behind the "ui" profile.
  #
  # It shares the backend container's network namespace (network_mode:
  # service:backend), so from the browser's point of view the SPA is served at
  # http://localhost:5173 and the API is http://localhost:8080 — exactly the
  # origins config/backend/e2e.yaml already allows (cors.allow_origin / post_login_url).
  # That makes the SPA→API call cross-origin (CORS handled) but same-site (host
  # "localhost"), so the forged session cookie is sent. The cookie itself is
  # read from /certs/session.json, minted by fakeapis with the same secret its
  # authd fake verifies.
  ui:
    profiles: ["ui"]
    build:
      context: ../.. # repo root — the SPA needs frontend/ and shared/
      dockerfile: backend/e2e/Dockerfile.ui
    network_mode: "service:backend" # SPA=localhost:5173, API=localhost:8080
    depends_on:
      backend:
        condition: service_started
      fakeapis:
        condition: service_healthy # session.json present before the browser starts
    environment:
      E2E_SESSION_FILE: /certs/session.json
    volumes:
      - certs:/certs:ro # read the forged session cookie

volumes:
  certs: # holds the fakeapis-minted CA + forged session, shared across services
