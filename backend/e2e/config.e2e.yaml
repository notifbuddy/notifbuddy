# Backend configuration for the black-box e2e suite (backend/e2e).
#
# Runs the real server against a throwaway Postgres inside docker compose with
# external dependencies either stubbed or intercepted:
#   - Sessions resolve against the authd fake fakeapis serves over plain HTTP
#     (auth.base_url below) — tokens are HMAC-signed identity payloads forged
#     offline by the harness with the shared secret.
#   - Outbound SDK calls (Linear/GitHub as wired) go through the fakeapis MITM
#     proxy (HTTPS_PROXY -> fakeapis, SSL_CERT_FILE -> its CA) and are served
#     by in-process fakes — the server keeps using the real SDK against the
#     real hostname.
#   - Slack / Linear / Cloudflare / Stripe secrets are empty => "not configured".
#   - Linear webhook secret IS set so we can test HMAC verification (401 on a bad
#     signature, 202 on a good one).
#   - billing.mode = beta => nothing locks.
#
# Secrets come from the environment (docker-compose.e2e.yml sets them). An unset
# ${VAR} expands to "" (feature disabled).

server:
  addr: ":8080"

logging:
  format: "text"
  level: "info"

cors:
  allow_origin: "http://localhost:5173" # exercised by the CORS preflight test

auth:
  # fakeapis serves a minimal authd (get-session et al) for e2e sessions.
  base_url: "${AUTHD_BASE_URL}"

app:
  post_login_url: "http://localhost:5173"
  insecure_cookies: true # plain-HTTP container traffic; keeps Set-Cookie usable

database:
  url: "${DATABASE_URL}" # throwaway compose Postgres
  migrate: true # build the schema on boot

encryption:
  provider: "local"
  local_key: "${INTEGRATION_ENC_KEY}" # base64 32-byte key (stable across restarts)
  kms_key_id: ""

pubsub:
  provider: "postgres" # watermill over the app DB; no GCP needed
  postgres:
    poll_interval: "200ms"
    log_events: false

slack:
  client_id: "e2e.slack"
  client_secret: "${SLACK_CLIENT_SECRET}" # set => connect endpoint starts the OAuth flow
  scopes:
    - chat:write
  user_scopes:
    - chat:write
  callback_url: "http://localhost:8080/integrations/slack/callback"
  # Set: with client_secret configured, validate() (on main) requires this too.
  # Enables Slack webhook HMAC verification — no Slack webhook test depends on it.
  signing_secret: "${SLACK_SIGNING_SECRET}"

linear:
  client_id: "e2e-linear"
  client_secret: "" # OAuth disabled
  scopes:
    - read
    - write
  callback_url: "http://localhost:8080/integrations/linear/callback"
  webhook_secret: "${LINEAR_WEBHOOK_SECRET}" # SET — enables HMAC verification tests

cloudflare:
  account_id: "" # Workers AI disabled => intent resolves to no-action
  api_token: ""
  model: "@cf/meta/llama-3.1-8b-instruct"

billing:
  mode: "beta" # nothing locks

stripe:
  api_key: ""
  webhook_secret: ""
  price_id: ""
