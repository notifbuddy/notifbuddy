# PRODUCTION authd (config/authd/prod.yaml).
# Docker/Cloud Run: NB_ENV=prod CONFIG_FILE=config/authd/prod.yaml

server:
  port: 8787 # Cloud Run injects PORT; the PORT env wins when set

auth:
  base_url: "https://auth.notifbuddy.com"
  secret: "${BETTER_AUTH_SECRET}" # SECRET — Infisical prod
  cookie_domain: ".notifbuddy.com" # api.* must see the session cookie
  # Empty → Better Auth default "better-auth". Preview deploys set
  # better-auth-pr-<n> so the shared cookie Domain does not overwrite prod.
  cookie_prefix: ""

database:
  url: "${DATABASE_URL}" # injected by infra from the Neon connection string

cors:
  trusted_origins:
    # Credentialed CORS: no "*". Wildcards let oAuthProxy hand preview
    # OAuth back to auth-pr-* / dashboard-pr-* (Better Auth supports *).
    - "https://dashboard.notifbuddy.com"
    - "https://dashboard-pr-*.notifbuddy.com"
    - "https://auth-pr-*.notifbuddy.com"

github:
  # Prod GitHub OAuth app; callback https://auth.notifbuddy.com/api/auth/callback/github
  # (also the only callback used by preview via oAuthProxy).
  client_id: "${GITHUB_CLIENT_ID}"
  client_secret: "${GITHUB_CLIENT_SECRET}" # SECRET

# Shared with preview authd — encrypts OAuth profile handoff. Same value in
# Infisical /auth for prod and preview Cloud Run.
oauth_proxy:
  production_url: "https://auth.notifbuddy.com"
  secret: "${OAUTH_PROXY_SECRET}" # SECRET

email:
  resend_api_key: "${RESEND_API_KEY}" # SECRET
  # DMARC on the zone uses strict alignment: mail MUST come from the Resend
  # sending domain notifications.notifbuddy.com, not the bare zone.
  from: "notifbuddy <auth@notifications.notifbuddy.com>"
