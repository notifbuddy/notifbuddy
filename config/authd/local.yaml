# authd local config (config/authd/local.yaml). Secrets via ${VAR}.
# Override with CONFIG_FILE=... or NB_ENV=local|prod|preview.

server:
  port: 8787 # PORT env (Cloud Run contract) wins when set

auth:
  base_url: "http://localhost:8787" # public base URL of this service
  secret: "${BETTER_AUTH_SECRET}" # SECRET — signing/encryption key (openssl rand -base64 32)
  cookie_domain: "" # empty locally; prod ".notifbuddy.com" so api.* sees the session cookie
  cookie_prefix: "" # empty → Better Auth default "better-auth"

database:
  # Dedicated database on the same homebrew postgres as the backend:
  #   psql -d postgres -c "CREATE DATABASE authd;"
  url: "postgres://localhost/authd"

cors:
  trusted_origins: # browser origins allowed to call authd (the dashboard SPA)
    - "http://localhost:5173"

github:
  # Required when config/featureflags/${NB_ENV}.yaml has github_oauth_login: true
  # (local/prod). Callback: <auth.base_url>/api/auth/callback/github
  client_id: "${GITHUB_CLIENT_ID}"
  client_secret: "${GITHUB_CLIENT_SECRET}" # SECRET

email:
  resend_api_key: "" # empty = invitation emails go to the console (dev sink)
  from: ""
