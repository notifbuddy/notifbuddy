<!doctype html>
<!-- Theme (light/dark/system) is managed by ModeWatcher in the root layout;
     it injects a blocking head script into the prerendered HTML so the right
     class is set before first paint. -->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<!-- Static theme-color for first paint / older iOS. iOS 26 Safari ignores
		     these and samples body / sticky header backgrounds instead. -->
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121113" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
