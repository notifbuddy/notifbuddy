<!doctype html>
<!-- Theme (light/dark/system) is managed by ModeWatcher in the root layout;
     it injects a blocking head script into the prerendered HTML so the right
     class is set before first paint. -->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
