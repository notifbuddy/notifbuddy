name: Waitlist build & deploy

# Builds the standalone waitlist service image (waitlist-backend/), pushes it
# to Artifact Registry, and deploys it to Cloud Run. Manual trigger only
# (Actions tab → Run workflow). Mirrors backend-deploy.yml.
#
# Auth is keyless via Workload Identity Federation (no service-account JSON).
# All deploy settings come from the committed deploy config (non-secret
# identifiers) — the same file infra reads — not GitHub repo variables.
#
# The Cloud Run env (WAITLIST_DATABASE_URL) is managed by infra, not here —
# this workflow only rolls out a new image, preserving the existing config.

on:
  workflow_dispatch: # manual only — trigger from the Actions tab

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          # yq is preinstalled on ubuntu-latest runners.
          cfg=deploy config
          {
            echo "GCP_PROJECT_ID=$(yq -r '.gcp.project_id' "$cfg")"
            echo "GCP_REGION=$(yq -r '.gcp.region' "$cfg")"
            echo "AR_REPO=$(yq -r '.gcp.artifact_repo' "$cfg")"
            echo "CLOUD_RUN_SERVICE=$(yq -r '.waitlist.cloud_run_service' "$cfg")"
            echo "GCP_WIF_PROVIDER=$(yq -r '.ci.wif_provider' "$cfg")"
            echo "GCP_DEPLOY_SA=$(yq -r '.ci.deploy_service_account' "$cfg")"
          } >> "$GITHUB_ENV"
          region=$(yq -r '.gcp.region' "$cfg")
          project=$(yq -r '.gcp.project_id' "$cfg")
          repo=$(yq -r '.gcp.artifact_repo' "$cfg")
          echo "IMAGE=${region}-docker.pkg.dev/${project}/${repo}/waitlist-backend:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - id: auth
        name: Authenticate to GCP (keyless)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          docker build -t "$IMAGE" ./waitlist-backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT_ID" \
            --quiet
