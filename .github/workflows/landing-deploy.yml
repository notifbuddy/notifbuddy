name: Landing build & deploy

# Builds the marketing/waitlist site (landing/) and uploads it to Cloudflare
# Pages. Manual trigger only (Actions tab → Run workflow). Mirrors the Cloud
# Run workflows: infra owns the Pages project/domain/DNS (infra/), this only
# ships new builds.
#
# Secrets: CLOUDFLARE_API_KEY must hold a scoped API token with
# "Cloudflare Pages: Edit" (the same token infra uses needs Zone DNS Edit
# + Zone Read as well). Non-secret settings come from deploy config.
#
# PUBLIC_WAITLIST_URL is the site's own origin: the form posts same-origin to
# /waitlist and a Pages Function (landing/functions/waitlist.js) proxies it to
# the Cloud Run waitlist service.

on:
  workflow_dispatch: # manual only — trigger from the Actions tab

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          # yq is preinstalled on ubuntu-latest runners.
          cfg=deploy config
          {
            echo "CLOUDFLARE_ACCOUNT_ID=$(yq -r '.cloudflare.account_id' "$cfg")"
            echo "PAGES_PROJECT=$(yq -r '.cloudflare.pages_project' "$cfg")"
            echo "PUBLIC_WAITLIST_URL=https://$(yq -r '.cloudflare.zone' "$cfg")"
          } >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_KEY }}
        run: npx wrangler@4 pages deploy build --project-name "$PAGES_PROJECT" --branch main