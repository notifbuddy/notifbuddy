name: Release → GHCR (self-host images)

# Publishes the public, self-hostable images that the Helm chart deploys.
#
# Deliberately tag-only: pushes to main keep going to Artifact Registry via
# publish-images.yml and deploy straight to our prod, but self-hosters should
# only ever move when we cut a version. Nothing here touches prod.
#
# Images land at ghcr.io/notifbuddy/{backend,authd,dashboard} as amd64 + arm64
# manifest lists, tagged with the full version, the major.minor series, and
# latest.
#
# Each architecture builds on its own native runner (arm64 on GitHub's
# ubuntu-24.04-arm, free for public repos) rather than under QEMU, then a
# second job stitches the per-arch digests into one manifest list. Emulated
# arm64 builds are slow enough to dominate the release, and authd's npm
# install is exactly the kind of work QEMU is worst at.
#
# NOTE: a GHCR package is private on first publish. Each of the three has to be
# flipped to public once, by hand, in the org's package settings — otherwise
# `helm install` fails on an image pull for everyone.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write # push to GHCR

concurrency: release-${{ github.ref }}

env:
  REGISTRY: ghcr.io/notifbuddy

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: [backend, authd, dashboard]
        arch: [amd64, arm64]
        # These entries carry no new combinations — they just attach the
        # per-image build inputs and the per-arch runner to the six jobs above.
        include:
          - image: backend
            context: backend
            dockerfile: backend/Dockerfile
          - image: authd
            context: authd
            dockerfile: authd/Dockerfile
          # The SPA build needs frontend/ and the repo-root shared/, so this
          # one builds from the repo root.
          - image: dashboard
            context: .
            dockerfile: frontend/Dockerfile
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}

      # Pushed by digest with no tag: tagging happens once, in the manifest job,
      # so a half-finished release never leaves :latest pointing at one arch.
      - name: Build ${{ matrix.image }} (${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # Hand the digest to the manifest job as an empty file named after it.
      # The "sha256:" prefix is stripped because upload-artifact rejects a
      # colon in a path; the manifest job puts it back.
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, authd, dashboard]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          # Keep the leading "v" so the image tag, the git tag and the chart's
          # appVersion are all the same string. metadata-action strips it by
          # default, which would leave us translating between v0.1.0 and 0.1.0
          # in every place that references a version.
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          # Both substitutions are meant to split into separate arguments:
          # one -t per tag, one image@digest per architecture.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ matrix.image }}@sha256:%s ' *)

      # Fails the release if the list didn't come out with both architectures.
      - name: Verify both architectures are present
        run: |
          ref="${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}"
          docker buildx imagetools inspect "$ref"
          for want in linux/amd64 linux/arm64; do
            docker buildx imagetools inspect "$ref" --raw \
              | jq -e --arg w "$want" \
                  '[.manifests[] | select(.platform) | "\(.platform.os)/\(.platform.architecture)"] | index($w)' \
                  >/dev/null \
              || { echo "::error::$ref is missing $want"; exit 1; }
          done

  # The chart publishes only after every image manifest is in place: a chart
  # that references images which do not exist yet is worse than no chart.
  chart:
    needs: manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      # The chart's own version is hand-maintained in Chart.yaml and moves
      # independently of the app. Republishing over an existing version would
      # silently change what an existing pin resolves to, so refuse instead.
      - name: Refuse to overwrite a published chart version
        run: |
          version=$(helm show chart charts/notifbuddy | awk '/^version:/ {print $2}')
          echo "chart version: $version"
          if helm show chart "oci://${{ env.REGISTRY }}/charts/notifbuddy" \
               --version "$version" >/dev/null 2>&1; then
            echo "::error::chart version $version is already published — bump version in charts/notifbuddy/Chart.yaml"
            exit 1
          fi
          echo "CHART_VERSION=$version" >>"$GITHUB_ENV"

      # appVersion comes from the tag being released rather than the committed
      # value, so a published chart always points at images from the same
      # release and cannot drift from Chart.yaml being forgotten.
      - name: Package
        run: |
          helm package charts/notifbuddy \
            --app-version "${{ github.ref_name }}" \
            --destination /tmp/chart

      - name: Push
        run: |
          helm push "/tmp/chart/notifbuddy-${CHART_VERSION}.tgz" \
            "oci://${{ env.REGISTRY }}/charts"

      - name: Verify what landed in the registry
        run: |
          out=$(helm show chart "oci://${{ env.REGISTRY }}/charts/notifbuddy" --version "$CHART_VERSION")
          echo "$out"
          echo "$out" | grep -qx "version: $CHART_VERSION" \
            || { echo "::error::published chart version is not $CHART_VERSION"; exit 1; }
          echo "$out" | grep -qx "appVersion: ${{ github.ref_name }}" \
            || { echo "::error::published appVersion is not ${{ github.ref_name }}"; exit 1; }

      # Artifact Hub ownership metadata, pushed as an OCI artifact next to the
      # chart. Skipped until repositoryID is filled in — see the file.
      - name: Publish Artifact Hub metadata
        run: |
          id=$(awk '/^repositoryID:/ {print $2}' charts/artifacthub-repo.yml | tr -d '"')
          if [ -z "$id" ]; then
            echo "::notice::charts/artifacthub-repo.yml has no repositoryID yet — skipping ownership metadata"
            exit 0
          fi
          curl -sSfL https://github.com/oras-project/oras/releases/download/v1.2.0/oras_1.2.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin oras
          oras login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          oras push "${{ env.REGISTRY }}/charts/notifbuddy:artifacthub.io" \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            charts/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
