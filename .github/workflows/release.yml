name: Release → GHCR (self-host images)

# Publishes the public, self-hostable images that the Helm chart deploys.
#
# Deliberately tag-only: pushes to main keep going to Artifact Registry via
# publish-images.yml and deploy straight to our prod, but self-hosters should
# only ever move when we cut a version. Nothing here touches prod.
#
# Images land at ghcr.io/notifbuddy/{backend,authd,dashboard}, tagged with the
# full version, the major.minor series, and latest.
#
# NOTE: a GHCR package is private on first publish. Each of the three has to be
# flipped to public once, by hand, in the org's package settings — otherwise
# `helm install` fails on an image pull for everyone.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write # push to GHCR

concurrency: release-${{ github.ref }}

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Dockerfile
          - name: authd
            context: authd
            dockerfile: authd/Dockerfile
          # The SPA build needs frontend/ and the repo-root shared/, so this
          # one builds from the repo root.
          - name: dashboard
            context: .
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # arm64 matters here in a way it doesn't for Cloud Run: self-hosters run
      # on Graviton, Ampere and the like. The Go build cross-compiles natively
      # (see backend/Dockerfile); the SPA build is architecture-independent and
      # pinned to the build platform; only authd's npm install runs emulated,
      # and its dependencies are pure JavaScript.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/notifbuddy/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
