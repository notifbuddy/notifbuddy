name: Preview trigger

# Single entrypoint for PR previews. Detects which static apps changed in the
# PR and dispatches one iac preview.yml run with that service list.
# Deploys live under preview.notifbuddy.com (see iac config.yaml).
#
# Supported services (Phase 1+): landing, docs, dashboard
# (api/auth come later with the full-stack preview work.)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    paths:
      - 'landing/**'
      - 'userdocs/**'
      - 'frontend/**'
      - '.github/workflows/preview.yml'

permissions:
  contents: read
  id-token: write # GitHub OIDC → Infisical machine identity
  pull-requests: read # list PR files for service detection

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    # Fork PRs have no Infisical OIDC / App secrets — same-repo only.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Detect changed preview services
        id: services
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --paginate \
            -q '.[].filename')

          services=()
          echo "$files" | grep -qE '^landing/' && services+=(landing)
          echo "$files" | grep -qE '^userdocs/' && services+=(docs)
          echo "$files" | grep -qE '^frontend/' && services+=(dashboard)

          if [ ${#services[@]} -eq 0 ]; then
            echo "No previewable app paths in this PR — skipping dispatch"
            echo "services=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          joined=$(IFS=,; echo "${services[*]}")
          echo "services=${joined}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Preview services: ${joined}"

      - name: Fetch GitHub App creds from Infisical (OIDC)
        if: steps.services.outputs.skip != 'true'
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: "oidc"
          identity-id: cfd37faa-b0db-46d6-8a16-a3fc85ff9ebf # notifbuddy-app-ci
          project-slug: notifbuddy-58-th
          env-slug: prod
          secret-path: "/ci"
          export-type: "env"

      - name: Mint cross-repo App token for notifbuddy/iac
        if: steps.services.outputs.skip != 'true'
        id: apptoken
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.NOTIFBUDDY_CI_APP_ID }}
          private-key: ${{ env.NOTIFBUDDY_CI_PRIVATE_KEY }}
          owner: notifbuddy
          repositories: iac

      - name: Dispatch iac preview
        if: steps.services.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          APP_REF: ${{ github.event.pull_request.head.sha }}
          ACTION: ${{ github.event.action == 'closed' && 'teardown' || 'deploy' }}
          SERVICES: ${{ steps.services.outputs.services }}
        run: |
          gh workflow run preview.yml \
            --repo notifbuddy/iac \
            --field action="${ACTION}" \
            --field app_ref="${APP_REF}" \
            --field pr_number="${PR_NUMBER}" \
            --field services="${SERVICES}"
