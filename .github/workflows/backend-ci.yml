name: Backend CI

# Vets + unit-tests the Go backend, then runs the black-box e2e suite against a
# fully wired server in docker compose (postgres + backend + test runner).
# GitHub-hosted ubuntu runners ship Docker + compose, so backend/e2e/run.sh
# works unchanged; it exits with the test runner's status (non-zero fails CI).
#
# Runs on every branch push and PR. The e2e stack is hermetic — WorkOS is
# null-routed and every other external SaaS is disabled by config.e2e.yaml — so
# no secrets are needed.

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: vet + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

  e2e:
    name: e2e (docker compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run e2e suite
        run: ./run.sh
        working-directory: backend/e2e
