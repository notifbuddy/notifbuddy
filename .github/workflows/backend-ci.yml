name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: vet + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

  e2e:
    name: e2e (docker compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run e2e suite
        run: ./run.sh
        working-directory: backend/e2e

  ui-e2e:
    name: dashboard e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run dashboard e2e suite
        run: ./run-ui.sh
        working-directory: backend/e2e
