name: Publish images → iac deploy

# Builds the backend image, pushes it to Artifact Registry, then opens AND
# auto-merges a bot PR on notifbuddy/iac that bumps deploy.auto.tfvars to the
# new digest + the source commit (app_revision). iac runs terraform apply on
# every push to its main, so merging to main HERE deploys to prod unattended.
# iac fetches the eventing manifest from THIS repo at that commit — this repo
# stays the single source of truth. This repo BUILDS; iac DEPLOYS.
#
# Prereqs (one-time, all provisioned):
#   - GCP: notifbuddy-image-pusher SA (roles/artifactregistry.writer); WIF
#     provider condition allows this repo.
#   - Infisical: notifbuddy-app-ci machine identity, OIDC-bound to this repo,
#     reads the GitHub App creds from /ci (prod). No App secrets in GitHub.
#   - A GitHub App installed on notifbuddy/iac with Contents:write +
#     Pull requests:write (its id/key live in Infisical /ci) — the default
#     GITHUB_TOKEN cannot open PRs on another repo.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Workload Identity Federation → Artifact Registry

concurrency: publish-images # serialize; keep a single open bot PR

env:
  REGION: us-east4
  AR: us-east4-docker.pkg.dev/notifbuddy/notifbuddy

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # workflow_dispatch has no diff to filter on — rebuild unconditionally.
      backend: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/publish-images.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/41636012349/locations/global/workloadIdentityPools/github/providers/github
          service_account: notifbuddy-image-pusher@notifbuddy.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - uses: docker/setup-buildx-action@v3
      - name: Build + push backend
        id: build
        uses: docker/build-push-action@v6
        with:
          context: backend
          platforms: linux/amd64 # Cloud Run is x86
          push: true
          tags: ${{ env.AR }}/backend:src-${{ github.sha }}

  open-pr:
    needs: [backend]
    if: needs.backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      # Pull the GitHub App creds from Infisical (/ci) via keyless GitHub OIDC —
      # no App id/key stored as GitHub Actions secrets. Exports NOTIFBUDDY_CI_APP_ID
      # + NOTIFBUDDY_CI_PRIVATE_KEY to the env. Default OIDC audience is the repo
      # owner URL (https://github.com/notifbuddy), which the identity is bound to.
      - name: Fetch GitHub App creds from Infisical (OIDC)
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: "oidc"
          identity-id: cfd37faa-b0db-46d6-8a16-a3fc85ff9ebf # notifbuddy-app-ci
          project-slug: notifbuddy-58-th
          env-slug: prod
          secret-path: "/ci"
          export-type: "env"

      - name: Mint cross-repo App token for notifbuddy/iac
        id: apptoken
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.NOTIFBUDDY_CI_APP_ID }}
          private-key: ${{ env.NOTIFBUDDY_CI_PRIVATE_KEY }}
          owner: notifbuddy
          repositories: iac

      - name: Open + auto-merge image-bump PR on notifbuddy/iac
        env:
          GH_TOKEN: ${{ steps.apptoken.outputs.token }}
          BACKEND_DIGEST: ${{ needs.backend.outputs.digest }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/notifbuddy/iac" iac
          cd iac

          # Base the bot branch on its previous tip when one exists so an
          # unmerged pending bump keeps a single open PR.
          if git fetch --depth 1 origin bot/image-bump; then
            git checkout -B bot/image-bump FETCH_HEAD
          else
            git checkout -B bot/image-bump
          fi

          backend_image="${AR}/backend@${BACKEND_DIGEST}"

          # Only the digest + the source commit. The manifest is NOT copied —
          # iac fetches it from this repo at app_revision, keeping this repo the
          # single source of truth for the eventing topology.
          cat > deploy.auto.tfvars <<EOF
          # Managed by the app repo publish-images workflow — do not hand-edit.
          backend_image = "${backend_image}"
          app_revision  = "${GITHUB_SHA}"
          EOF

          git add -A
          if git diff --cached --quiet; then
            echo "digests unchanged — nothing to open"
            exit 0
          fi

          git -c user.name=notifbuddy-bot -c user.email=bot@users.noreply.github.com \
            commit -m "deploy: bump images to ${GITHUB_SHA:0:12}"
          git push -f origin bot/image-bump

          gh pr create --repo notifbuddy/iac --head bot/image-bump --base main \
            --title "deploy: bump images to ${GITHUB_SHA:0:12}" \
            --body "Auto-generated by publish-images (app repo @ ${GITHUB_SHA:0:12}). Auto-merged; iac applies on push to main." \
            2>/dev/null || echo "PR already open — branch force-updated with new digests"

          # Continuous deployment: merge the bump immediately — iac runs
          # terraform apply on every push to main, so this merge IS the deploy.
          # A failure here (e.g. a conflict on deploy.auto.tfvars) fails the job
          # loudly and leaves the PR open for a human.
          gh pr merge bot/image-bump --repo notifbuddy/iac --squash --delete-branch
